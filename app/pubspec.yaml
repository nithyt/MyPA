name: mypa
description: "MyPA — Your Personal & Business AI Assistant"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # State management (Architecture v1.4, Section 4.1)
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Voice (Architecture v1.4, Section 7)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
