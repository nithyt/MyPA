name: Flutter CI

# Ref: Architecture Document v1.4, Section 13 (CI/CD & Deployment Architecture)
# Ref: Technical Design Document v1.3
#
# Every push/PR runs analyze + test first (fast feedback). Platform builds
# only run if that passes, and only build (not deploy) — store submission
# is a separate, tag-triggered workflow to add later once signing
# credentials are configured (see Environment Setup Guide, Section 8).

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/flutter-ci.yml'

defaults:
  run:
    working-directory: app

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    name: Build Android (APK)
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: flutter pub get
      - run: flutter build apk --debug

  build-windows:
    name: Build Windows
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --debug

  build-macos:
    name: Build macOS
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: pod repo update
        working-directory: app/macos
      - run: flutter build macos --debug

  build-ios:
    name: Build iOS
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: pod repo update
        working-directory: app/ios
      # --no-codesign: this CI job proves the build compiles; real device/
      # store builds need signing credentials wired in separately
      # (Environment Setup Guide, Section 8).
      - run: flutter build ios --debug --no-codesign
